<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>{% block title %}Patchy{% endblock %} - AI GitHub Security Bot</title>
    <meta name="description" content="{% block meta_description %}Patchy - Multi-agent AI security bot for your GitHub repositories. Auto-scan vulnerabilities, generate fixes, and respond to issues.{% endblock %}">
    
    <!-- BACKEND: Add dynamic meta tags here (og:image, twitter:card, etc.) -->
    
    <!-- Preconnect to Google Fonts for faster loading -->
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    
    <!-- Fonts: Space Grotesk + Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <!-- TailwindCSS CDN -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    
    <!-- Tailwind Configuration (Design Tokens from Stitch) -->
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-tertiary-container": "#4c1a00",
                        "on-surface-variant": "#c1c6d7",
                        "surface-tint": "#adc6ff",
                        "primary-fixed": "#d8e2ff",
                        "inverse-surface": "#e0e2ed",
                        "on-error": "#690005",
                        "tertiary": "#ffb595",
                        "surface-container": "#1c2028",
                        "error": "#ffb4ab",
                        "tertiary-fixed-dim": "#ffb595",
                        "background": "#10131b",
                        "on-tertiary": "#571e00",
                        "on-secondary": "#003824",
                        "tertiary-container": "#ef6719",
                        "surface-container-high": "#272a32",
                        "on-primary-container": "#00285c",
                        "on-error-container": "#ffdad6",
                        "on-primary": "#002e69",
                        "on-secondary-fixed": "#002113",
                        "primary": "#adc6ff",
                        "on-surface": "#e0e2ed",
                        "surface-dim": "#10131b",
                        "primary-container": "#4b8eff",
                        "inverse-on-surface": "#2d3039",
                        "surface-container-lowest": "#0b0e16",
                        "secondary": "#4edea3",
                        "on-tertiary-fixed-variant": "#7c2e00",
                        "on-background": "#e0e2ed",
                        "inverse-primary": "#005bc1",
                        "on-secondary-container": "#00311f",
                        "secondary-container": "#00a572",
                        "tertiary-fixed": "#ffdbcc",
                        "outline-variant": "#414755",
                        "surface-container-low": "#181c23",
                        "secondary-fixed": "#6ffbbe",
                        "on-tertiary-fixed": "#351000",
                        "surface-variant": "#31353d",
                        "on-secondary-fixed-variant": "#005236",
                        "outline": "#8b90a0",
                        "surface-bright": "#363942",
                        "primary-fixed-dim": "#adc6ff",
                        "surface-container-highest": "#31353d",
                        "secondary-fixed-dim": "#4edea3",
                        "error-container": "#93000a",
                        "on-primary-fixed": "#001a41",
                        "on-primary-fixed-variant": "#004493",
                        "surface": "#10131b"
                    },
                    borderRadius: {
                        DEFAULT: "0.125rem",
                        lg: "0.25rem",
                        xl: "0.5rem",
                        full: "0.75rem"
                    },
                    spacing: {
                        sm: "8px",
                        margin: "24px",
                        gutter: "16px",
                        xs: "4px",
                        lg: "24px",
                        unit: "4px",
                        xl: "40px",
                        md: "16px"
                    },
                    fontFamily: {
                        "body-md": ["Space Grotesk"],
                        "body-sm": ["Space Grotesk"],
                        "mono": ["monospace"],
                        "h3": ["Space Grotesk"],
                        "h1": ["Space Grotesk"],
                        "h2": ["Space Grotesk"],
                        "body-lg": ["Space Grotesk"],
                        "label-caps": ["Space Grotesk"]
                    },
                    fontSize: {
                        "body-md": ["16px", { lineHeight: "1.6", fontWeight: "400" }],
                        "body-sm": ["14px", { lineHeight: "1.5", fontWeight: "400" }],
                        "mono": ["14px", { lineHeight: "1.6", fontWeight: "400" }],
                        "h3": ["24px", { lineHeight: "1.3", letterSpacing: "0em", fontWeight: "600" }],
                        "h1": ["48px", { lineHeight: "1.1", letterSpacing: "-0.02em", fontWeight: "700" }],
                        "h2": ["32px", { lineHeight: "1.2", letterSpacing: "-0.01em", fontWeight: "600" }],
                        "body-lg": ["18px", { lineHeight: "1.6", fontWeight: "400" }],
                        "label-caps": ["12px", { lineHeight: "1.2", letterSpacing: "0.1em", fontWeight: "700" }]
                    }
                }
            }
        }
    </script>
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    
    {% block head %}{% endblock %}
</head>
<body class="bg-background text-on-surface font-body-md text-body-md antialiased overflow-x-hidden selection:bg-primary/30 selection:text-primary min-h-screen flex flex-col">
    
    {% block body %}{% endblock %}
    
    <!-- Toast Notification Container -->
    <div class="toast-container" id="toast-container"></div>
    
    <!-- Global Scripts -->
    <script src="{{ url_for('static', filename='js/api.js') }}"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
