<!-- 
  Sidebar Component (App Shell)
  Used on: dashboard.html, scan_results.html, scan_detail.html
  
  BACKEND: Highlight active nav item via `active_page` variable
  Expected values: 'organization', 'vulnerabilities', 'dependency', 'compliance'
-->

<aside class="app-sidebar bg-[#0d1117] hidden md:flex flex-col h-[calc(100vh-64px)] w-64 border-r border-[#30363d] fixed left-0 top-16 z-40 overflow-y-auto font-['Space_Grotesk'] text-sm" role="navigation" aria-label="Sidebar navigation">
    <!-- Platform Info + New Scan CTA -->
    <div class="p-6 border-b border-[#30363d] flex flex-col gap-unit">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded bg-blue-500/10 border border-blue-500/30 flex items-center justify-center">
                <span class="material-symbols-outlined text-blue-500 text-[20px]">grid_view</span>
            </div>
            <div>
                <h2 class="text-white font-black text-body-md">Patchy Platform</h2>
                <span class="text-slate-500 font-mono text-mono">v1.2.0-stable</span>
            </div>
        </div>
        <!-- BACKEND: This triggers the scan flow -->
        <button class="mt-md bg-inverse-primary text-on-primary-container hover:bg-primary-container transition-colors duration-200 py-2 px-4 rounded-DEFAULT font-h3 text-body-sm shadow-[inset_0_1px_0px_rgba(255,255,255,0.2)] flex items-center justify-center gap-2" 
                id="sidebar-new-scan" onclick="showScanModal()">
            <span class="material-symbols-outlined text-sm">add</span>
            New Scan
        </button>
    </div>
    
    <!-- Navigation Links -->
    <nav class="flex-1 py-4 flex flex-col gap-1" aria-label="Platform sections">
        <a class="flex items-center gap-sm px-6 py-3 transition-colors duration-200 active:translate-x-1 
                  {% if active_page == 'organization' %}bg-[#161b22] text-blue-500 border-l-2 border-blue-500{% else %}text-slate-500 hover:bg-[#21262d] hover:text-white border-l-2 border-transparent{% endif %}" 
           href="{{ url_for('dashboard') }}" id="sidebar-organization">
            <span class="material-symbols-outlined">business</span>
            <span>Organization</span>
        </a>
        <a class="flex items-center gap-sm px-6 py-3 transition-colors duration-200 active:translate-x-1 
                  {% if active_page == 'vulnerabilities' %}bg-[#161b22] text-blue-500 border-l-2 border-blue-500{% else %}text-slate-500 hover:bg-[#21262d] hover:text-white border-l-2 border-transparent{% endif %}" 
           href="{{ url_for('scans') }}" id="sidebar-vulnerabilities">
            <span class="material-symbols-outlined" {% if active_page == 'vulnerabilities' %}style="font-variation-settings: 'FILL' 1;"{% endif %}>security</span>
            <span {% if active_page == 'vulnerabilities' %}class="font-bold"{% endif %}>Vulnerabilities</span>
        </a>
        <a class="flex items-center gap-sm px-6 py-3 text-slate-500 hover:bg-[#21262d] hover:text-white transition-colors duration-200 active:translate-x-1 border-l-2 border-transparent" 
           href="#" id="sidebar-dependency">
            <span class="material-symbols-outlined">hub</span>
            <span>Dependency Graph</span>
        </a>
        <a class="flex items-center gap-sm px-6 py-3 text-slate-500 hover:bg-[#21262d] hover:text-white transition-colors duration-200 active:translate-x-1 border-l-2 border-transparent" 
           href="#" id="sidebar-compliance">
            <span class="material-symbols-outlined">verified_user</span>
            <span>Compliance</span>
        </a>
    </nav>
    
    <!-- Footer Links -->
    <div class="p-4 border-t border-[#30363d] flex flex-col gap-1">
        <a class="flex items-center gap-sm px-4 py-2 text-slate-500 hover:bg-[#21262d] hover:text-white transition-colors duration-200 rounded-DEFAULT" href="#">
            <span class="material-symbols-outlined text-[20px]">menu_book</span>
            <span>Docs</span>
        </a>
        <a class="flex items-center gap-sm px-4 py-2 text-slate-500 hover:bg-[#21262d] hover:text-white transition-colors duration-200 rounded-DEFAULT" href="#">
            <span class="material-symbols-outlined text-[20px]">support_agent</span>
            <span>Support</span>
        </a>
    </div>
</aside>
