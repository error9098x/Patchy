<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patchy Avatar Generator</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c1c6d7;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 40px;
            text-align: center;
        }
        h1 {
            color: #fff;
            margin-bottom: 20px;
        }
        button {
            background: #161b22;
            border: 1px solid #30363d;
            color: #fff;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 40px;
            font-weight: bold;
        }
        button:hover {
            background: #21262d;
            border-color: #8b90a0;
        }
        .grid {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            max-width: 900px;
            margin: 0 auto;
        }
        .avatar-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            transition: transform 0.2s;
        }
        .avatar-card:hover {
            transform: translateY(-5px);
        }
        .name {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
    </style>
</head>
<body>
    <h1>Avatar Generator</h1>
    <p style="margin-bottom: 30px;">Mixing random shapes and colors. Circle background is a 15% opacity variant of the main color.</p>
    <button onclick="generateGrid()">Generate Random Avatars</button>
    <div class="grid" id="avatar-grid"></div>

    <script>
        const colors = [
            { name: "Green", hex: "#4edea3" },
            { name: "Blue", hex: "#adc6ff" },
            { name: "Purple", hex: "#b392f0" },
            { name: "Orange", hex: "#ffb595" },
            { name: "Yellow", hex: "#febc2e" },
            { name: "Red", hex: "#ffb4ab" },
            { name: "Cyan", hex: "#00e5ff" }
        ];

        const shapes = [
            {
                name: "Classic",
                svg: `
                    <path d="M 42 35 a 8 8 0 0 1 16 0 Z" />
                    <path d="M 32 46 a 7 7 0 0 0 0 14 Z" />
                    <path d="M 68 46 a 7 7 0 0 1 0 14 Z" />
                    <rect x="28" y="38" width="44" height="30" rx="6" />
                    <circle cx="40" cy="48" r="4.5" fill="#161b22" />
                    <circle cx="60" cy="48" r="4.5" fill="#161b22" />
                    <rect x="42" y="56" width="16" height="4" fill="#161b22" />
                `
            },
            {
                name: "Cyclops",
                svg: `
                    <rect x="38" y="28" width="24" height="8" rx="2" />
                    <rect x="26" y="36" width="48" height="34" rx="8" />
                    <circle cx="50" cy="48" r="10" fill="#161b22" />
                    <circle cx="50" cy="48" r="4" fill="currentColor" />
                    <rect x="40" y="62" width="20" height="3" fill="#161b22" rx="1.5" />
                `
            },
            {
                name: "Antenna",
                svg: `
                    <rect x="35" y="24" width="4" height="20" />
                    <rect x="61" y="24" width="4" height="20" />
                    <circle cx="37" cy="24" r="5" />
                    <circle cx="63" cy="24" r="5" />
                    <rect x="22" y="42" width="56" height="26" rx="13" /> 
                    <rect x="34" y="48" width="10" height="6" rx="3" fill="#161b22" />
                    <rect x="56" y="48" width="10" height="6" rx="3" fill="#161b22" />
                `
            },
            {
                name: "Shield",
                svg: `
                    <path d="M 50 28 L 76 38 L 76 58 L 50 72 L 24 58 L 24 38 Z" stroke-linejoin="round" />
                    <path d="M 36 46 L 46 50 L 46 53 L 36 49 Z" fill="#161b22" />
                    <path d="M 64 46 L 54 50 L 54 53 L 64 49 Z" fill="#161b22" />
                    <path d="M 40 60 L 45 57 L 50 60 L 55 57 L 60 60" stroke="#161b22" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" />
                `
            },
            {
                name: "Wide",
                svg: `
                    <rect x="18" y="44" width="6" height="12" rx="3" />
                    <rect x="76" y="44" width="6" height="12" rx="3" />
                    <circle cx="50" cy="50" r="23" />
                    <path d="M 40 46 Q 44 40 48 46" stroke="#161b22" stroke-width="3" stroke-linecap="round" fill="none" />
                    <path d="M 52 46 Q 56 40 60 46" stroke="#161b22" stroke-width="3" stroke-linecap="round" fill="none" />
                    <circle cx="50" cy="56" r="4" fill="#161b22" />
                `
            }
        ];

        function getRandomItem(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function generateAvatar() {
            const color = getRandomItem(colors);
            const shape = getRandomItem(shapes);

            return `
                <div class="avatar-card" style="color: ${color.hex};">
                    <svg viewBox="0 0 100 100" width="100" height="100">
                        <circle cx="50" cy="50" r="46" fill="currentColor" fill-opacity="0.15" stroke="currentColor" stroke-opacity="0.3" stroke-width="2"/>
                        <g fill="currentColor">
                            ${shape.svg}
                        </g>
                    </svg>
                    <div class="name">${color.name} ${shape.name}</div>
                </div>
            `;
        }

        function generateGrid() {
            const grid = document.getElementById('avatar-grid');
            let html = '';
            for (let i = 0; i < 15; i++) {
                html += generateAvatar();
            }
            grid.innerHTML = html;
        }

        // Generate initial grid
        generateGrid();
    </script>
</body>
</html>
